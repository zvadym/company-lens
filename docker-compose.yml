services:
  api:
    build: .
    environment:
      COMPANY_LENS_ENVIRONMENT: local
      COMPANY_LENS_LOG_LEVEL: INFO
      COMPANY_LENS_DATABASE_URL: postgresql+psycopg://company_lens:company_lens@postgres:5432/company_lens
      COMPANY_LENS_TRACE_CONTENT: ${COMPANY_LENS_TRACE_CONTENT:-redacted}
      COMPANY_LENS_LANGFUSE_PUBLIC_KEY: ${COMPANY_LENS_LANGFUSE_PUBLIC_KEY:-${LANGFUSE_PUBLIC_KEY:-}}
      COMPANY_LENS_LANGFUSE_SECRET_KEY: ${COMPANY_LENS_LANGFUSE_SECRET_KEY:-${LANGFUSE_SECRET_KEY:-}}
      COMPANY_LENS_LANGFUSE_BASE_URL: ${COMPANY_LENS_LANGFUSE_BASE_URL:-${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build: .
    command: ["company-lens", "research-worker"]
    environment:
      COMPANY_LENS_ENVIRONMENT: local
      COMPANY_LENS_LOG_LEVEL: INFO
      COMPANY_LENS_DATABASE_URL: postgresql+psycopg://company_lens:company_lens@postgres:5432/company_lens
      COMPANY_LENS_TRACE_CONTENT: ${COMPANY_LENS_TRACE_CONTENT:-redacted}
      COMPANY_LENS_LANGFUSE_PUBLIC_KEY: ${COMPANY_LENS_LANGFUSE_PUBLIC_KEY:-${LANGFUSE_PUBLIC_KEY:-}}
      COMPANY_LENS_LANGFUSE_SECRET_KEY: ${COMPANY_LENS_LANGFUSE_SECRET_KEY:-${LANGFUSE_SECRET_KEY:-}}
      COMPANY_LENS_LANGFUSE_BASE_URL: ${COMPANY_LENS_LANGFUSE_BASE_URL:-${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: company_lens
      POSTGRES_USER: company_lens
      POSTGRES_PASSWORD: company_lens
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U company_lens -d company_lens"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
