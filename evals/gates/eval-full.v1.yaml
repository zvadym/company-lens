name: eval-full
version: 1
# Full live runs require execution metrics because they exercise the real agent loop.
require_operational_metrics: true
minimums:
  case_pass_rate: 1.0
  company_accuracy: 1.0
  metric_accuracy: 1.0
  operation_accuracy: 1.0
  route_accuracy: 1.0
  required_tool_recall: 1.0
  prohibited_tool_pass_rate: 1.0
  follow_up_safety_accuracy: 1.0
  operational_metrics_presence_rate: 1.0
  operational_budget_pass_rate: 1.0
maximums:
  missing_result_rate: 0.0
operational_budgets:
  max_total_latency_ms: 900000
  max_time_to_first_event_ms: 300000
  max_node_latency_ms: 300000
  max_tool_calls: 10
  max_repair_attempts: 1
  max_api_calls: 10
  max_retry_count: 10
