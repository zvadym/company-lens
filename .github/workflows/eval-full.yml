name: Full LLM Evaluation

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: Golden dataset path.
        required: true
        default: evals/datasets/golden/core.v1.yaml
      max_cases:
        description: Maximum number of selected cases to run.
        required: true
        default: "100"
      model:
        description: OpenAI model used for planning, repair, and answer generation.
        required: true
        default: gpt-4.1-mini
      max_tool_calls:
        description: Per-case agent tool-call budget.
        required: true
        default: "10"
      sec_user_agent:
        description: SEC user-agent string for on-demand data preparation.
        required: true
        default: CompanyLens eval contact@example.com

jobs:
  eval-full:
    runs-on: ubuntu-latest
    # GitHub exposes environment secrets only to jobs that target that environment.
    environment: Testing
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: company_lens
          POSTGRES_USER: company_lens
          POSTGRES_PASSWORD: company_lens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U company_lens -d company_lens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      COMPANY_LENS_DATABASE_URL: postgresql+psycopg://company_lens:company_lens@localhost:5432/company_lens
      COMPANY_LENS_SEMANTIC_JUDGE_ENABLED: "false"
      COMPANY_LENS_OPENAI_PLANNING_MODEL: ${{ inputs.model }}
      COMPANY_LENS_OPENAI_ANSWER_MODEL: ${{ inputs.model }}
      COMPANY_LENS_OPENAI_REPAIR_MODEL: ${{ inputs.model }}
      COMPANY_LENS_OPENAI_PLANNING_REASONING_EFFORT: "none"
      COMPANY_LENS_OPENAI_ANSWER_REASONING_EFFORT: "none"
      COMPANY_LENS_OPENAI_REPAIR_REASONING_EFFORT: "none"
      COMPANY_LENS_SEC_USER_AGENT: ${{ inputs.sec_user_agent }}
      COMPANY_LENS_ENVIRONMENT: github-actions
      COMPANY_LENS_SERVICE_VERSION: ${{ github.sha }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      # Optional: when configured, the same model calls are traced in Langfuse.
      COMPANY_LENS_LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      COMPANY_LENS_LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      COMPANY_LENS_LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL || 'https://cloud.langfuse.com' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Normalize API secrets
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          required = {"OPENAI_API_KEY"}
          secret_names = (
              "OPENAI_API_KEY",
              "FRED_API_KEY",
              "COMPANY_LENS_LANGFUSE_PUBLIC_KEY",
              "COMPANY_LENS_LANGFUSE_SECRET_KEY",
          )
          env_file = Path(os.environ["GITHUB_ENV"])
          with env_file.open("a", encoding="utf-8") as handle:
              for name in secret_names:
                  # UI-entered environment secrets can include trailing newlines,
                  # which are illegal inside HTTP authorization headers.
                  normalized = (
                      os.environ.get(name, "")
                      .replace("\r", "")
                      .replace("\n", "")
                      .strip()
                  )
                  if name in required and not normalized:
                      raise SystemExit(f"{name} is required for full LLM evaluation.")
                  if normalized:
                      handle.write(f"{name}={normalized}\n")
          PY

      - name: Check OpenAI model access
        run: |
          python - <<'PY'
          import os
          from openai import OpenAI

          model = os.environ["COMPANY_LENS_OPENAI_PLANNING_MODEL"]
          # This preflight is an infrastructure smoke check, so retry transient
          # provider-side 5xx/connection failures before failing the workflow.
          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"].strip(), max_retries=2)
          response = client.responses.create(
              model=model,
              input="Reply with the exact word: ok",
              max_output_tokens=16,
              store=False,
          )
          print({"model": getattr(response, "model", model), "response_id": response.id})
          PY

      - name: Run database migrations
        run: alembic upgrade head

      - name: Initialize research persistence
        run: company-lens research setup --pretty

      - name: Prepare core evaluation data
        run: |
          company-lens ingest-company-facts --ticker NET
          company-lens ingest-sec --ticker NET --form 10-K
          company-lens process-documents --kind sec_filing --limit 4
          company-lens index-embeddings --embedding-provider openai --batch-size 100

      - name: Run live agent on golden cases
        run: |
          company-lens run-golden-agent \
            --dataset "${{ inputs.dataset }}" \
            --output observed-results.json \
            --max-cases "${{ inputs.max_cases }}" \
            --max-tool-calls "${{ inputs.max_tool_calls }}" \
            --session-prefix "github-eval-${{ github.run_id }}" \
            --pretty

      - name: Evaluate observed results
        run: |
          company-lens evaluate-golden-results \
            --dataset "${{ inputs.dataset }}" \
            --results observed-results.json \
            --gate evals/gates/eval-full.v1.yaml \
            --markdown-output evaluation-report.md \
            --pretty

      - name: Upload evaluation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: full-llm-evaluation-${{ github.run_id }}
          path: |
            observed-results.json
            evaluation-report.md
