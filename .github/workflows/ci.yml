name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: company_lens
          POSTGRES_USER: company_lens
          POSTGRES_PASSWORD: company_lens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U company_lens -d company_lens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      COMPANY_LENS_TEST_DATABASE_URL: postgresql+psycopg://company_lens:company_lens@localhost:5432/company_lens

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run checks
        run: make check

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: python -m pip install -e ".[dev]"

      - name: Scan Python dependencies
        run: pip-audit

      - name: Scan Python source
        run: bandit -q -r src/company_lens -ll -ii

      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production image
        run: docker build -t company-lens:ci .

      - name: Scan production image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: company-lens:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          limit-severities-for-sarif: true
          exit-code: "1"

      - name: Upload image scan report
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
